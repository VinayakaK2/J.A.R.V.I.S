services:
  # ── Managed PostgreSQL (State Persistence) ──
  - type: database
    name: jarvis-db
    plan: free
    region: oregon

  # ── Managed Redis (Task Queue) ──
  - type: redis
    name: jarvis-redis
    plan: free
    ipAllowList: [] # Internal-only access

  # ── FastAPI Web Service (JARVIS Cloud Brain) ──
  - type: web
    name: jarvis-brain
    plan: free
    env: python
    buildCommand: pip install -r jarvis/requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker --chdir jarvis main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jarvis-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: jarvis-redis
          property: connectionString
      - key: USE_EXECUTION_STATE
        value: "true"
      - key: PORT
        value: "8000"
      # Manual configuration required for:
      # OPENAI_API_KEY, ELEVENLABS_API_KEY, TWILIO_ACCOUNT_SID etc.

  # ── Background Worker (Goal Autonomy) ──
  - type: worker
    name: jarvis-worker
    plan: free
    env: python
    buildCommand: pip install -r jarvis/requirements.txt
    startCommand: python jarvis/worker.py
    envVars:
      - key: REDIS_URL
        fromRedis:
          name: jarvis-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: jarvis-db
          property: connectionString
