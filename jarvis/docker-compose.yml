version: '3.8'
services:
  redis:
    image: redis:alpine
    container_name: jarvis_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  worker:
    build: .
    container_name: jarvis_worker
    command: python worker.py
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  backend:
    build: .
    container_name: jarvis_backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=this-is-a-production-secret-override-this
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    depends_on:
      - redis
    volumes:
      - ./workspace:/app/workspace
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: jarvis_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
